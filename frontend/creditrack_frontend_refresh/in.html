<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrediTrack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <style>
    /* CENTER WRAPPER */
    .home-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef3f8, #f7fafc);
    }

    /* MAIN CARD */
    .home-card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.95);
      border-radius: 34px;
      padding: 50px 40px;
      text-align: center;
      border: 1px solid rgba(0,201,177,0.4);
      box-shadow:
        0 20px 50px rgba(13,31,45,0.1),
        0 0 30px rgba(0,201,177,0.1);
    }

    /* LOGO BOX */
    .logo-box {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      border-radius: 28px;
      background: linear-gradient(180deg, #f8fbff, #edf3ff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 15px 35px rgba(111,146,255,0.2);
    }

    .logo-box img {
      width: 60px;
    }

    /* TITLE */
    .home-title {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .home-title span {
      color: var(--teal);
    }

    .home-sub {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .home-tag {
      color: var(--text-light);
      margin-bottom: 30px;
    }

    /* BUTTONS */
    .home-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1.5px solid rgba(0,201,177,0.5);
      text-decoration: none;
      font-weight: 700;
      color: var(--teal);
      margin-bottom: 15px;
      transition: 0.2s;
    }

    .home-btn:hover {
      background: var(--teal);
      color: white;
      transform: translateY(-2px);
    }
    .home-btn i {
  color: var(--teal);
  font-size: 1.2rem;
}
  </style>
</head>

<body>

  <div class="home-wrapper">
    <div class="home-card">

      <!-- LOGO -->
      <div class="logo-box">
        <img src="credilogo.png.png" alt="logo">
      </div>

      <!-- TITLE -->
      <div class="home-title">
        Credi<span>Track</span>
      </div>

      <div class="home-sub">Activity Point Tracker</div>
      <div class="home-tag">Track, verify and earn points</div>

      <!-- BUTTONS -->
      <a href="student_login.html" class="home-btn">
         <i class="fas fa-user-graduate"></i>
         Student Login
      </a>

      <a href="faculty_login.html" class="home-btn">
          <i class="fas fa-chalkboard-teacher"></i>
        Faculty Login
      </a>

    </div>
  </div>

</body>
</html>
