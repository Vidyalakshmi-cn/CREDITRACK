<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - CrediTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <div class="logo"><span class="c1">Credi</span><span class="c2">Track</span></div>
    <div class="top-actions">
      <a class="btn btn-outline" href="upload.html">Upload Certificate</a>
      <button class="btn btn-danger" onclick="logoutStudent()">Logout</button>
    </div>
  </div>

  <div class="page-wrap">
    <aside class="sidebar">
      <div class="side-title">Student</div>
      <a class="side-link active" href="Student_dash.html">Dashboard</a>
      <a class="side-link" href="upload.html">Upload</a>
    </aside>

    <main class="content">
      <div class="section-title">Student Dashboard</div>

      <div class="card">
        <div class="side-title" style="padding:0;margin-bottom:.8rem;color:var(--muted)">My Profile</div>
        <div class="profile-grid">
          <div class="profile-item"><div class="k">Name</div><div class="v" id="studentName">-</div></div>
          <div class="profile-item"><div class="k">Roll No</div><div class="v" id="rollno">-</div></div>
          <div class="profile-item"><div class="k">Course</div><div class="v" id="course">-</div></div>
          <div class="profile-item"><div class="k">Branch</div><div class="v" id="branch">-</div></div>
          <div class="profile-item"><div class="k">Semester</div><div class="v" id="semester">-</div></div>
          <div class="profile-item"><div class="k">Division</div><div class="v" id="division">-</div></div>
          <div class="profile-item"><div class="k">Duration</div><div class="v" id="duration">-</div></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat teal"><div class="n" id="totalPoints">0</div><div class="t">Total Points</div></div>
        <div class="stat green"><div class="n" id="approvedCount">0</div><div class="t">Approved</div></div>
        <div class="stat amber"><div class="n" id="pendingCount">0</div><div class="t">Pending</div></div>
        <div class="stat red"><div class="n" id="rejectedCount">0</div><div class="t">Rejected</div></div>
      </div>

      <div class="card">
        <div class="side-title" style="padding:0;margin-bottom:.8rem;color:var(--muted)">KTU Progress</div>
        <div style="display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap">
          <div style="font-weight:700">Points Earned</div>
          <div style="font-weight:800;color:var(--teal-dark)"><span id="progressText">0 / 100</span></div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <div class="card">
        <div class="side-title" style="padding:0;margin-bottom:.8rem;color:var(--muted)">Activity Log</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Activity</th>
                <th>Head</th>
                <th>Status</th>
                <th>Points</th>
                <th>Certificate</th>
              </tr>
            </thead>
            <tbody id="activityTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="student_dash.js"></script>
</body>
</html>
